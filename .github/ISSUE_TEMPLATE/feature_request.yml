name: Feature request
description: Propose a change to the project.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve. Describe the use case, not the solution yet.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What you would like to see. API sketches welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try or think about.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: See CONTRIBUTING.md for scope rules.
      options:
        - label: This does not add a UI or visual builder.
        - label: This does not add a domain-specific vertical.
