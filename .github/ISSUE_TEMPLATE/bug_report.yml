name: Bug report
description: Something is broken.
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, in one or two sentences.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: whapi-agent version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: 20.x
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log excerpt (redact secrets).
      render: shell
